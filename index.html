<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0F172A" />
    <meta
      name="description"
      content="Panelhaus — AI-powered comic book creation studio. Create comics with AI image generation."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/apple-touch-icon.png"
    />
    <title>Panelhaus — AI Comic Studio</title>
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/sample.webp"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
  </head>
  <body>
    <div id="root">
      <!-- Static skeleton — painted immediately, replaced when React mounts -->
      <div
        style="
          background: #0f172a;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <div style="text-align: center">
          <h1
            style="
              font-family: &quot;Space Grotesk&quot;, sans-serif;
              font-weight: 800;
              font-style: italic;
              color: #c8e6c9;
              font-size: 1.5rem;
              letter-spacing: -0.05em;
              text-transform: uppercase;
              margin: 0;
            "
          >
            PANEL SHAQ
          </h1>
          <div
            style="
              width: 3rem;
              height: 3rem;
              border: 4px solid rgba(200, 230, 201, 0.2);
              border-top-color: #c8e6c9;
              border-radius: 50%;
              animation: spin 1s linear infinite;
              margin: 1.5rem auto 1rem;
            "
          ></div>
          <p
            style="
              font-size: 10px;
              color: rgba(255, 255, 255, 0.3);
              text-transform: uppercase;
              letter-spacing: 0.1em;
              font-weight: 700;
            "
          >
            Loading...
          </p>
        </div>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
